  # Track Session #1 — 500m WU + 1x1600m + 2x800m + 4x400m + 500m CD (5 km)
  t1: &track_t1_garmin
    steps:
      - stepType: "warmup"
        endCondition: "distance"
        endConditionValue: 500
        targetType: "heart.rate.zone"
        zoneNumber: 2

      - stepType: "interval"
        endCondition: "distance"
        endConditionValue: 1600
        targetType: "no.target"

      - stepType: "recovery"
        endCondition: "lap.button"
        targetType: "no.target"

      - stepType: "repeat"
        numberOfIterations: 2
        childStepId: 1
        steps:
          - stepType: "interval"
            endCondition: "distance"
            endConditionValue: 800
            targetType: "no.target"
            childStepId: 1

          - stepType: "recovery"
            endCondition: "lap.button"
            targetType: "no.target"
            childStepId: 1

      - stepType: "repeat"
