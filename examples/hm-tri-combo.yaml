      - week: 12
        description: |
          Taper everything. Arrive rested, sharp, confident.

          **Race Week Goals:** Lock in race kit (shoes, socks, shorts, top, hat, watch settings) — wear nothing on race day you haven't trained in. Plan fueling: dinner Friday night (familiar carbs), breakfast 3 hrs pre-race, gels at 7/14 km. Check weather mid-week and pick layers accordingly. Sleep is highest leverage Wednesday/Thursday; Saturday night nerves are normal. Prospect Park hills come first 5 km — start at 5:10–5:15/km, do not chase pace early. Settle on the flat, push from 15 km if controlled.

