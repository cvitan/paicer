                - stepType: "warmup"
                  endCondition: "distance"
                  endConditionValue: 5000  # 5 km
                  targetType: "no.target"
                  description: "5 km warmup (RPE 4-5)"

                - stepType: "repeat"
                  numberOfIterations: 4
                  childStepId: 1
                  steps:
                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z2 (RPE 5)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 360
                      targetType: "no.target"
                      description: "6 min @ Z3 (RPE 6)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z4 (RPE 7)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z4 (RPE 8)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z5 (RPE 9)"
                      childStepId: 1

                - stepType: "cooldown"
                  endCondition: "distance"
                  endConditionValue: 2000  # 2 km
                  targetType: "no.target"
                  description: "2 km cooldown (RPE 4)"

          # Day 3 - Track
          - day: 3
            type: "track"
            name: "Track Session #1"
            description: "5 km. Track Session #1 (1x1600 m, 2x800 m, 4x400 m). Aim to better times from last time you did this session."
            garmin: *track_t1_garmin

          # Day 4 - Swim
          - day: 4
            type: "swim"
            name: "Session #8 2500 m"
            garmin: *swim_s8_garmin
            description: "2.5 km. If using a swim watch or pace clock, you should see improvements in speed and ability to hold speed for longer."

          # Day 5 - Run
          - day: 5
            type: "run"
            name: "Long Steady 9 km"
            description: "9 km @RPE 5–6. Pace should be kept well within comfort. Focus on holding pace for whole duration. Good benchmark for base pace after 2 months of training — use this to pace longer runs for the rest of the program."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 9000  # 9 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

          # Day 6 - Bike
          - day: 6
            type: "bike"
            name: "Hills 45 km"
            description: "45 km. Steady state with hills included. Maintain steady cadence and rhythm. Pace judgement on climbs. Riding uphill increases strength; learning to descend confidently will be valuable."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 45000  # 45 km
                  targetType: "no.target"

      - week: 15
        description: |
          Tri Wk 9. "Time Trial" week — test progress and set race target pace. Any new kit (goggles, trainers, elastic laces, bike shoes, tri suit) must be tested in training. Open water competency is a massive factor for race day.

          **Tri Plan Goals:** 'Time Trial' week. This is an opportunity to test yourself in each discipline and get an idea of where you'd be setting your race target pace. Any new kit you're planning to use should be in use in training to test it now: goggles (tinted for open water), trainers, elastic laces, bike shoes, tri suit etc. You need to make sure it all fits and works where and when you need it. Open water competency will be a massive factor in your comfort, confidence and will count come race day.

          **Volume:** 70.5 km total

        workouts:
          # Day 1 - Swim
          - day: 1
            type: "swim"
            name: "Session #7 2500 m"
            garmin: *swim_s7_garmin
            description: "2.5 km. Swim the first 1 km of the main set as a straight Time Trial for a race-pace time — good progress marker. Resume second km as normal interval breakdown. When breathing, keep one eye in the water and lead hand out front."

          # Day 2 - Bike
          - day: 2
            type: "bike"
            name: "Bike TT 20 km"
            description: "20 km. 1 km warm up @RPE 5. Then aim to hit threshold speed for the rest of the distance. Easy leg spin to cool down. Flat route preferred; also suitable for turbo/gym bike. Tests how well you can hold goal race pace."
            garmin:
              steps:
                - stepType: "warmup"
                  endCondition: "distance"
                  endConditionValue: 1000  # 1 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 18000  # 18 km
                  targetType: "no.target"

                - stepType: "cooldown"
                  endCondition: "distance"
                  endConditionValue: 1000  # 1 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

          # Day 3 - Swim + Run combo
          - day: 3
            type: "swim"
            name: "Session #4 2000 m"
            garmin: *swim_s4_garmin
            description: "2 km."

          - day: 3
            type: "run"
            name: "Best Effort 10 km"
            description: "Aim for your fastest sustainable pace for 10 km @RPE 8. Best effort 'test' — may be slower than race-day target but gives rough idea of progress and whether target time is realistic."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 10000  # 10 km
                  targetType: "no.target"

          # Day 4 - Track
          - day: 4
            type: "track"
            name: "Track Session #1"
            description: "5 km. Track Session #1 (1x1600 m, 2x800 m, 4x400 m). Aim to hit the 800s at 5 sec/lap faster than the 1600, and the 400s another 3–5 sec/lap quicker. Each repeated distance must be consistent."
            garmin: *track_t1_garmin

          # Day 5 - Open Water Swim
          - day: 5
            type: "swim"
            name: "Open Water 1000 m"
            skip_garmin: true
            description: "First open water swim! 1 km. Ensure proper wetsuit fitting and spend time acclimatising to the water (may be colder early season). Cover distance aiming to swim smoothly, keeping good technique. Practice sighting. Practice breathing to weaker side."

          # Day 6 - Brick
          - day: 6
            type: "multisport"
            name: "Brick 25 km Bike + 5 km Run"
            garmin:
              legs:
                - sport: "bike"
                  steps:
                    - stepType: "warmup"
                      endCondition: "distance"
                      endConditionValue: 12500  # 12.5 km
                      targetType: "heart.rate.zone"
                      zoneNumber: 2
                      description: "12.5 km @ Z2 (RPE 6)"
                    - stepType: "interval"
                      endCondition: "distance"
                      endConditionValue: 12500  # 12.5 km
                      targetType: "no.target"
                      description: "12.5 km @ Z4 (RPE 8)"
                - sport: "run"
                  steps:
                    - stepType: "warmup"
                      endCondition: "distance"
                      endConditionValue: 2500  # 2.5 km
                      targetType: "heart.rate.zone"
                      zoneNumber: 2
                      description: "2.5 km @ Z2 (RPE 6)"
                    - stepType: "interval"
                      endCondition: "distance"
                      endConditionValue: 2500  # 2.5 km
                      targetType: "heart.rate.zone"
                      zoneNumber: 4
                      description: "2.5 km @ Z4 (RPE 8)"
            description: "25 km bike + 5 km run. First half each discipline @RPE 6, build to race pace @RPE 8 second half. Bike: play with bar positions; learn to run negative split off bike for race-pace control."

      - week: 16
        description: |
          Tri Wk 10. Test new kit in training. Open water competency building — massive factor for comfort and confidence on race day. Practice getting wetsuit on/off and warming up quickly so it's routine on race day.

          **Tri Plan Goals:** Any kit you're planning to use should now be in regular use. Test new goggles (tinted for open water), trainers, elastic laces, bike shoes, tri suit etc. You need to make sure it all fits and works where you need it. Open water competency will be a massive factor in your comfort, confidence and will count come race day. Practice getting the suit on, getting it wet and getting used to it quickly so that come race day it's all routine. Consider goggle choice for weather/lighting conditions.

          **Volume:** 94.5 km total

        workouts:
          # Day 1 - Swim
          - day: 1
            type: "swim"
            name: "Session #8 2500 m"
            garmin: *swim_s8_garmin
            description: "2.5 km. Count strokes per length to check technique — if count increases, you're losing efficiency or fatiguing. When breathing, keep one eye in the water, lead hand out front until recovery arm is coming forward."

          # Day 2 - Bike
          - day: 2
            type: "bike"
            name: "Bike Incremental 25 km"
            description: "25 km incremental: 8 km Z2 / 8 km Z3 / 8 km Z4 / 1 km cooldown. Increasing work rate, pacing near/above threshold. Suitable for turbo. Outdoors: aim to raise average HR by 5–10 bpm every 10 km."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 8000  # 8 km
                  targetType: "no.target"
                  description: "8 km @ Z2 (RPE 5)"

                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 8000  # 8 km
                  targetType: "no.target"
                  description: "8 km @ Z3 (RPE 7)"

                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 8000  # 8 km
                  targetType: "no.target"
                  description: "8 km @ Z4 (RPE 8-9)"

                - stepType: "cooldown"
                  endCondition: "distance"
                  endConditionValue: 1000  # 1 km
                  targetType: "no.target"
                  description: "1 km cooldown (RPE 4)"

          # Day 3 - Run
          - day: 3
            type: "run"
            name: "Sub-max Steady 10 km"
            description: "10 km sub-max steady @RPE 6. Aim for comfortable good run form with minimal changes in HR. Can do as off-road run with minimal undulation. Warm up with foam rolling & mobility for better run form."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 10000  # 10 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

          # Day 4 - Run
          - day: 4
            type: "run"
            name: "Fartlek 5.5 km"
            description: "5.5 km fartlek — random intervals on a route of your choosing. Average pace ~@RPE 6, with time spent between RPE 5–9. Good session to do with a friend (take turns calling sprints/efforts)."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 5500  # 5.5 km
                  targetType: "no.target"

          # Day 5 - Open Water Swim
          - day: 5
            type: "swim"
            name: "Open Water 1500 m"
            skip_garmin: true
            description: "1.5 km. Developing confidence and skills. Fit wetsuit properly, acclimatise, relax stroke, focus on breathing. Start adding sighting every 2–4 breaths. Join a group if possible for coaching points. @RPE 6–7."

          # Day 6 - Bike
          - day: 6
            type: "bike"
            name: "Hills 50 km"
            description: "50 km. Head out on a route @RPE 6. Plan some hills for harder work intervals. Good pacing on hills is important — too easy and you lose time, too hard and you'll be slower on the flats."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 50000  # 50 km
                  targetType: "no.target"

      - week: 17
        description: |
          Tri Wk 11. Endurance improvements should be clear — hold higher efforts for longer. Use hill sessions for power and control. Keep improving open water skills & confidence. Practice transition after OWS (wetsuit off quickly while moving, running after swim).

          **Tri Plan Goals:** As the volume reaches this level you should really feel the endurance improvements. Focus on your ability to hold higher pace for longer. Keep improving open water skills & confidence. Throw in a quick transition practice after your OWS: getting wetsuit off, cycling shoes on, running after a swim. Use hill sessions to focus on power and control.

          **Volume:** 84.5 km total

        workouts:
          # Day 1 - Swim
          - day: 1
            type: "swim"
            name: "Session #7 2500 m"
            garmin: *swim_s7_garmin
            description: "2.5 km. Pace control — aim to repeat pace of each set. Maintain alignment and form even on harder/shorter sets. Losing technique makes you slower."

          # Day 2 - Bike
          - day: 2
            type: "bike"
            name: "Hills 30 km"
            description: "30 km. Use a hilly route or one good climb (>3 min ascent). Mix seated and standing climbing, keep rhythm. Get used to descending too. Plan a 5–8 km loop around one hill and repeat if no hilly route available."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 30000  # 30 km
                  targetType: "no.target"

          # Day 3 - Swim + Run combo
          - day: 3
            type: "swim"
            name: "Session #5 2000 m"
            garmin: *swim_s5_garmin
            description: "2 km."

          # Day 3 - Track
          - day: 3
            type: "track"
            name: "Track Session #3"
            description: "7.5 km. Track Session #3 (1x1200 m, 3x400 m, 1x1200 m, 3x400 m, 1x1200 m, 3x400 m = 7600 m total). Sets of same distance should be repeated at the same speed/time. Aim to beat times from previous attempts. Longer sets closer to goal race pace; shorter sets faster."
            garmin: *track_t3_garmin

          # Day 4 - Run
          - day: 4
            type: "run"
            name: "Steady Tempo 5 km"
            description: "5 km steady tempo @RPE 7. Focus on run form and posture. Aim to keep 1 km splits as similar as possible. Ensure hydrated; practice with race-day energy products."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 5000  # 5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 3

          # Day 5 - Open Water Swim
          - day: 5
            type: "swim"
            name: "Open Water 1500 m"
            skip_garmin: true
            description: "1.5 km. Practice sighting, adapting stroke to wetsuit and open water. Slow cadence and work with buoyancy of suit. Break session into adaptation time, then finish with 400–500 m hard effort @RPE 7. Focus on controlling breathing (often first to go in cold open water)."

          # Day 6 - Brick
          - day: 6
            type: "multisport"
            name: "Brick 30 km Bike + 5 km Run"
            garmin:
              legs:
                - sport: "bike"
                  steps:
                    - stepType: "interval"
                      endCondition: "distance"
                      endConditionValue: 30000  # 30 km
                      targetType: "heart.rate.zone"
                      zoneNumber: 3
                - sport: "run"
                  steps:
                    - stepType: "interval"
                      endCondition: "distance"
                      endConditionValue: 5000  # 5 km
                      targetType: "heart.rate.zone"
                      zoneNumber: 3
            description: "30 km bike + 5 km run. Option 1: Split into two mini-bricks of 15 km/2.5 km for more transition practice and speed work. Option 2: Complete through once at race pace. Experiment with aero positions (hoods, drops). @RPE 7–8."

      - week: 18
        description: |
          Tri Wk 12. PEAK VOLUME. Largest volume week — ensure sufficient fuelling and recovery/sleep. Stick to distance increases as best you can. Familiar sessions should show noticeable improvements.

          **Tri Plan Goals:** This is your largest volume week, so sufficient fuelling and recovery/sleep is key. Stick to the increases in distances as best you can, and where it fits. The more familiar sessions in the program should be seeing improvements; if you're happy to do so, use sessions e.g. swims to work on weaker areas like drills or sprints.

          **Volume:** 114.5 km total (peak)

        workouts:
          # Day 1 - Swim
          - day: 1
            type: "swim"
            name: "Session #8 2500 m"
            garmin: *swim_s8_garmin
            description: "2.5 km. Keep body position in mind — legs high in the water. Think about rotation through hips and forearm position on catch."

          # Day 2 - Bike
          - day: 2
            type: "bike"
            name: "Bike Intervals 35 km"
            description: "35 km. 5x5 format: 10 min warm up @RPE 5. Then: 5 min @RPE 6, 5 min @RPE 8–9. Repeat until 3–5 km to go, warm down @RPE 4–5. Suitable for turbo or outside. Outdoors: plan a route for loops or out-and-back."
            garmin:
              steps:
                - stepType: "warmup"
                  endCondition: "time"
                  endConditionValue: 600
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

                - stepType: "repeat"
                  numberOfIterations: 5
                  childStepId: 1
                  steps:
                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 300
                      targetType: "heart.rate.zone"
                      zoneNumber: 2
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 300
                      targetType: "no.target"
                      childStepId: 1

                - stepType: "cooldown"
                  endCondition: "distance"
                  endConditionValue: 3000  # 3 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

          # Day 3 - Run
          - day: 3
            type: "run"
            name: "Variable Effort 10 km"
            description: "10 km @RPE 6–9. Break into 4x2.5 km at RPE 6→8→7→9. Working at RPE 9 towards end will feel very tough but is good race-day prep and mental prep for working hard."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 2500  # 2.5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 3

                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 2500  # 2.5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 4

                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 2500  # 2.5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 4

                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 2500  # 2.5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 5

          # Day 4 - Track
          - day: 4
            type: "track"
            name: "Track Session #1"
            description: "5 km. Track Session #1 (1x1600 m, 2x800 m, 4x400 m). Aim to match or beat times from last track session."
            garmin: *track_t1_garmin

          # Day 5 - Open Water Swim
          - day: 5
            type: "swim"
            name: "Open Water 2000 m"
            skip_garmin: true
            description: "2 km. Continue wetsuit prep: get suit on, warm up dry-side, acclimatise and warm up within a couple of minutes (race-day practice). Work in harder efforts in the later part. 1-arm drills aid rotation & stroke efficiency for open water."

          # Day 6 - Bike
          - day: 6
            type: "bike"
            name: "Hills 60 km"
            description: "60 km. Steady state @RPE 6–8. Maintain steady cadence and rhythm on climbs and flat. If you have access to your race course, do a recon ride (2 laps). Pace judge climbs, note prevailing wind direction."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 60000  # 60 km
                  targetType: "no.target"

      - week: 19
        description: |
          Tri Wk 13. High volume running week — last tough one before taper. Speed work and pacing are key. Start thinking about race-day fluid needs. Field test ALL planned race equipment this week.

          **Tri Plan Goals:** This is a high volume week for running and your last tough one before you begin to taper. Speed work and pacing is key. Start to think about how much fluid you're using in training as a practice of what you'll need on race day. If you've got any new shoes for race day, start to wear them in now.

          **Volume:** 93.5 km total

        workouts:
          # Day 1 - Swim
          - day: 1
            type: "swim"
            name: "Session #9 2500 m"
            garmin: *swim_s9_garmin
            description: "2.5 km. Final fitness push — use shorter efforts to work hard and longer efforts to refocus on technique. Paddle work for stroke strength."

          # Day 2 - Bike
          - day: 2
            type: "bike"
            name: "Mixed Effort 30 km"
            description: "30 km. Mixed effort/fartlek. Preferably outdoors on naturally varied route. Add harder fartlek style efforts. Practice longer aerobar/drop efforts to work hard in a lower position. @RPE 5–7. Take adequate water & fuelling."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 30000  # 30 km
                  targetType: "no.target"

          # Day 3 - Swim + Run combo
          - day: 3
            type: "swim"
            name: "Session #6 2000 m"
            garmin: *swim_s6_garmin
            description: "2 km. Wear tri-suit underneath wetsuit. Practice sighting and speed work."

          - day: 3
            type: "run"
            name: "Negative Split 10 km"
            description: "10 km. Complete second half quicker than first, keeping intensity moderate @RPE 5–7. High volume day — if possible, plan good gap between swim and run. Make sure to eat and drink enough before/after."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 5000  # 5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 5000  # 5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 3

          # Day 4 - Run
          - day: 4
            type: "run"
            name: "Fartlek 5 km"
            description: "5 km fartlek — random intervals, average @RPE 6 with bursts RPE 5–9. Learning to return to base pace following effort. Good session with a friend."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 5000  # 5 km
                  targetType: "no.target"

          # Day 5 - Open Water Swim
          - day: 5
            type: "swim"
            name: "Open Water 1500 m"
            skip_garmin: true
            description: "1.5 km. Longer steady duration. Run through wetsuit fitting, lubricant, tri-suit underneath. If you can swim with a friend or group, good practice for race-day conditions. Mixing up speed simulates fatigue."

          # Day 6 - Brick
          - day: 6
            type: "multisport"
            name: "Brick 35 km Bike + 7.5 km Run"
            garmin:
              legs:
                - sport: "bike"
                  steps:
                    - stepType: "warmup"
                      endCondition: "distance"
                      endConditionValue: 2000  # 2 km
                      targetType: "no.target"
                      description: "2 km warmup (RPE 4-5)"
                    - stepType: "interval"
                      endCondition: "distance"
                      endConditionValue: 33000  # 33 km
                      targetType: "no.target"
                      description: "33 km @ Z4 (RPE 8+)"
                - sport: "run"
                  steps:
                    - stepType: "interval"
                      endCondition: "distance"
                      endConditionValue: 2000  # 2 km
                      targetType: "heart.rate.zone"
                      zoneNumber: 4
                      description: "2 km @ Z4 (RPE 8)"
                    - stepType: "interval"
                      endCondition: "distance"
                      endConditionValue: 5500  # 5.5 km
                      targetType: "heart.rate.zone"
                      zoneNumber: 2
                      description: "5.5 km @ Z2 (RPE 5-6)"
            description: "35 km bike + 7.5 km run. Race simulation. Use intended race kit, clothing, nutrition, bottles. Bike: warmup, then build to RPE 8+. Run: strong first 2 km off bike, then settle. Prep bike race-day style."

      - week: 20
        description: |
          Tri Wk 14. Last high volume week before taper. By end of this week you'll have a good race plan and realistic target. Plan your pacing and nutrition strategy. Any last-minute equipment purchases must be tested over race distance.

          **Tri Plan Goals:** This is the penultimate week before we start to bring the distance down. By the end of this week you'll have a good idea of your race plan and be able to set and plan your pacing and nutrition strategy. Make sure you have all the equipment you need, and any last-minute purchases are tested in training over race distance at least.

          **Volume:** 94.5 km total

        workouts:
          # Day 1 - Swim
          - day: 1
            type: "swim"
            name: "Session #7 2500 m"
            garmin: *swim_s7_garmin
            description: "2.5 km. You should be swimming these at your best pace in the program. Getting near best 100 m & 200 m times — the real show of fitness comes when you replicate this pace in open water."

          # Day 2 - Bike
          - day: 2
            type: "bike"
            name: "Bike Intervals 25 km"
            description: "25 km surge intervals. 3 km warmup, 4×(1min Z2/6min Z3/1min Z4/1min Z4/1min Z5), 2 km cooldown. Indoor preferred for tight execution. Outdoors: fartlek-style, longer efforts."
            garmin:
              steps:
                - stepType: "warmup"
                  endCondition: "distance"
                  endConditionValue: 3000  # 3 km
                  targetType: "no.target"
                  description: "3 km warmup (RPE 4-5)"

                - stepType: "repeat"
                  numberOfIterations: 4
                  childStepId: 1
                  steps:
                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z2 (RPE 5)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 360
                      targetType: "no.target"
                      description: "6 min @ Z3 (RPE 6)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z4 (RPE 7)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z4 (RPE 8)"
                      childStepId: 1

                    - stepType: "interval"
                      endCondition: "time"
                      endConditionValue: 60
                      targetType: "no.target"
                      description: "1 min @ Z5 (RPE 9)"
                      childStepId: 1

                - stepType: "cooldown"
                  endCondition: "distance"
                  endConditionValue: 2000  # 2 km
                  targetType: "no.target"
                  description: "2 km cooldown (RPE 4)"

          # Day 3 - Run
          - day: 3
            type: "run"
            name: "Steady State 10 km"
            description: "10 km @RPE 6–7. Aerobic run, route of your choosing. Focus on run form, posture and finishing feeling strong. If off-road or hilly, pace yourself to keep effort in correct zone."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 10000  # 10 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 3

          # Day 4 - Track
          - day: 4
            type: "track"
            name: "Track Session #1"
            description: "5 km. Track Session #1 (1x1600 m, 2x800 m, 4x400 m). Working above race pace. Can do each repeated distance as a negative split, trying to beat time of last segment by 1–2 seconds."
            garmin: *track_t1_garmin

          # Day 5 - Open Water Swim
          - day: 5
            type: "swim"
            name: "Open Water 2000 m"
            skip_garmin: true
            description: "2 km. Race day prep. Get suit on in plenty of time, fit properly. Warm up on land then in water within 2 min (race-day simulation). Practice start, swim race distance (1.5 km). Use remaining distance for sprints. Final race-pace prep — polish technique and pacing."

          # Day 6 - Bike
          - day: 6
            type: "bike"
            name: "Hills 50 km"
            description: "50 km. Steady state — maintain cadence and rhythm. Pace judgement on hills. Good pacing on hills maintains optimal race pace (too easy = lose time, too hard = slower on flats)."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 50000  # 50 km
                  targetType: "no.target"

      - week: 21
        description: |
          Race Week (Tri Wk 16). The hard work is done — nothing you can do now will make you fitter. Focus on maintaining peak while allowing recovery. Keep sessions high quality with good pace work. Reduced volume allows adaptation/recovery. Stick to what you know in training.

          Note: Tri PDF Wk 15 (taper) is absorbed into prior weeks; this week follows Wk 16 race-week schedule.

          **Tri Plan Goals:** Wk 15 (Taper): Bringing the volume down and working on speed will let your body start to recover while fine-tuning for your peak fitness. Everything should be aimed at setting up your race plan. All race plans need to be flexible; this is a critical stage in training and if you feel over-fatigued you must rest. Wk 16 (Race Week): The hard work is done, nothing you can do now will improve your form. The focus here is to maintain fitness while allowing recovery. Keep the sessions light with good pace work. Reduced volume/distance will allow for adaptation/recovery. If you've travelled to an event, having a run or swim when you get there helps you get over the journey.

          **Volume:** 72.5 km total (inc. race)

        workouts:
          # Day 1 - Swim
          - day: 1
            type: "swim"
            name: "Mixed Swim"
            garmin: *swim_mixed_garmin
            description: "1.5 km. Steady work with bursts — shouldn't feel tired after this."

          # Day 2 - Bike
          - day: 2
            type: "bike"
            name: "Pre-race Check 15 km"
            description: "15 km. Final pre-race bike check. Ride steady in race setup, carry what you plan to carry. Add 2–4 min bursts @RPE 5–7. After ride, clean bike and give tyres a once-over. Is all in working order? Do you have the spares you need?"
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 15000  # 15 km
                  targetType: "no.target"

          # Day 3 - Run
          - day: 3
            type: "run"
            name: "Easy 2.5 km"
            description: "2.5 km. Steady pace, focus on form and light foot strike. Add short bursts of harder effort @RPE 5–7. This distance should feel very easy now. Should feel good when you finish."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 2500  # 2.5 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

          # Day 4 - Run
          - day: 4
            type: "run"
            name: "Shakeout 1 km"
            description: "1 km. Still warming up — keep legs moving at a good tempo, but not quite race pace @RPE 7. Nice short session to loosen off."
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "distance"
                  endConditionValue: 1000  # 1 km
                  targetType: "heart.rate.zone"
                  zoneNumber: 2

          # Day 5 - Swim
          - day: 5
            type: "swim"
            name: "Easy 750 m"
            garmin:
              steps:
                - stepType: "interval"
                  endCondition: "lap.button"
                  targetType: "no.target"
                  description: "750m relaxed — easy laps with short bursts @ RPE 5-7"
            description: "750 m. Relaxed effort, loosening off with a few short bursts @RPE 5–7. Good position, technique, relaxed stroke. Can do in open water for confidence boost and wetsuit removal practice. If you've travelled to the event, this helps get over the journey."

          # Day 6 - RACE DAY
          - day: 6
            type: "race"
            name: "RACE: Olympic Triathlon"
            skip_garmin: true
            description: "Olympic Triathlon: 1.5 km Swim / 40 km Bike / 10 km Run. The hard work is over. Stick to what you know from training. Race hard, race well, and have fun!"

reviews:
  - week: 2
    date: "2026-03-08"
    notes: |
      All 4 running workouts completed as planned. Optional bike skipped.
      Tempo 2x15 min hit target: Rep 1 at 5:22/km (HR 165), Rep 2 at 5:28/km (HR 161),
      both inside the 5:10-5:40 window. Easy runs consistent at 6:23-6:31/km, HR ~146-147
      in Zone 2. Long run 14 km steady at 6:24/km, HR 147. Strides executed well with
      progressive acceleration. Total running volume ~41 km vs planned ~44 km (tempo run
      shorter than estimated). No pace or HR concerns.
    adjustments:
      - "No plan changes"

  - week: 3
    date: "2026-03-15"
    notes: |
