      - "Renamed all swim sessions: 'Session #N distance' in meters (was 'Swim #N')"

  - week: 6
    date: "2026-04-06"
    notes: |
      First full Phase 2 week — all 7 sessions completed (4 runs, 2 swims, 1 bike).
      Tempo 3x10 min: 5:11, 5:15, 5:28/km — all in 5:00-5:30 window but notable
      fade from rep 1 to 3 (17 sec/km drop, HR 162→166). Cut cooldown short (726m
      vs 2 km) as couldn't stay Z2 without walking. Elevation minimal (42m).
      Easy 8 km at 6:22/km, HR 141, 88m gain (11 m/km) — 39% Zone 3 from hills.
