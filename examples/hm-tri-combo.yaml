  - week: 5
    date: "2026-03-29"
    notes: |
      3 of 4 runs completed. Skipped Easy 6 km + Strides due to fatigue.
      Easy 7 km at 6:04/km, HR 139 — Zone 2 with 13% Zone 3 (59m gain, acceptable).
      5K Tempo cut short at 4 km — pace was on target at 5:00/km but HR spiked to
      163 avg (171 max) with 17 min in Zone 5. Right call to stop.
      Long 14 km at 6:30/km, HR 140 — slower than previous weeks but appropriate
      given elevated HR all week. 65m gain, 77% Zone 2.
      Training status: Productive. VO2max 46.2 (up from 45.8). Acute/chronic ratio
      0.7 (below optimal 0.8–1.5) — expected for recovery week with a skipped session.
      Load balance: anaerobic shortage. Elevated HR across all runs plus general
      fatigue (breathless going upstairs) suggests possible mild illness or accumulated
      fatigue from Phase 1. Recovery week served its purpose.
    adjustments:
