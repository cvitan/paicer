# Advanced example: Half Marathon + Olympic Triathlon combo plan.
# Phases 1 build HM fitness; Phase 2 layers in swim/bike + tapers for HM race;
# Phase 3 shifts focus to triathlon. See examples/reference-metric.yaml for the
# basic plan format.

# Reusable swim session definitions from RG Active Tri PDF appendix.
# Each anchor defines the garmin steps for a session.
# All steps use lap.button — press lap to advance to next cue.
# Rest steps between every section so you can catch your breath.
swim_sessions:
  # Session 1 — 1 km
  s1: &swim_s1_garmin
    steps:
      - stepType: "warmup"
        endCondition: "lap.button"
        targetType: "no.target"
        description: "100m freestyle @ RPE 4-5"
      - stepType: "rest"
        endCondition: "lap.button"
        targetType: "no.target"
      - stepType: "interval"
        endCondition: "lap.button"
        targetType: "no.target"
        description: "200m drill — 25m fist / 25m freestyle x4"
      - stepType: "rest"
        endCondition: "lap.button"
        targetType: "no.target"
      - stepType: "repeat"
        numberOfIterations: 2
        childStepId: 1
        steps:
          - stepType: "interval"
            endCondition: "lap.button"
            targetType: "no.target"
            description: "200m freestyle + pull buoy @ RPE 5"
            childStepId: 1
          - stepType: "rest"
            endCondition: "lap.button"
            targetType: "no.target"
            childStepId: 1
      - stepType: "repeat"
        numberOfIterations: 2
        childStepId: 2
        steps:
          - stepType: "interval"
            endCondition: "lap.button"
            targetType: "no.target"
            description: "100m freestyle @ RPE 7"
            childStepId: 2
          - stepType: "rest"
            endCondition: "lap.button"
            targetType: "no.target"
            childStepId: 2
      - stepType: "cooldown"
