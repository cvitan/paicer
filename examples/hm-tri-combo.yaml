      Tempo 4x1 km nailed: 5:13, 5:15, 5:16, 5:12/km — all within 5:00-5:30 target.
      Negative split with last rep fastest. HR 157-162 across reps, normal drift.
      Easy 9 km at 6:41/km, HR 148 — slightly elevated but 59m elevation gain
