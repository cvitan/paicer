            description: "Brooklyn Half Marathon — May 16. Start: 5:10–5:15/km through Prospect Park (RPE 7). Settle: 5:05–5:10/km on flat (RPE 7–8). At 15 km: if controlled, push toward 5:00/km (RPE 8+). Do NOT start at goal pace."

  - phase: 3
    name: "Triathlon Only"
    training_days: [1, 2, 3, 5, 6, 7]
    description: |
      **Format:** 6 sessions/week (Thu rest). ~8–12 hours/week.

    weeks:
      - week: 13
        description: |
          Recovery. 3–5 days of easy, unstructured movement after the half marathon.
          Walk, gentle spin, easy swim. No intervals, no structure. Let your body absorb the race effort. If something is sore, rest it. If you feel good by Thursday/Friday, a 20–30 min easy swim or spin is fine.

        workouts:
          # Day 1 - Optional easy spin
          - day: 1
            type: "bike"
            name: "Bike: Easy Spin"
            optional: true
            skip_garmin: true
            description: "Optional: 20–30 min easy spin @RPE 4. Keep it very light."

