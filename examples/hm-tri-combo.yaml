    notes: |
      All 4 runs completed. Tempo 2x4 km executed precisely: 5:12 and
      5:14/km, both within 5:05-5:25 target, consistent HR 154-156. Key session of
      Phase 1 — well done. Easy runs had elevated HR (144, 142) due to hilly terrain
      (109m and 94m gain). Long 17 km at 6:26/km, HR 142, 60m gain — 42% Zone 3
